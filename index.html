<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ultimate Barcode Scanner</title>
<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>
body{margin:0;font-family:sans-serif;background:#0f172a;color:white}
header{padding:15px;text-align:center;background:#1e293b}
.container{padding:15px}
video{width:100%;border-radius:12px;border:2px solid #38bdf8}
button{padding:10px;margin:5px;border:none;border-radius:8px;background:#38bdf8;color:black;cursor:pointer}
.result-box,.history{margin-top:15px;padding:10px;background:#1e293b;border-radius:10px}
.history-item{background:#334155;margin:5px;padding:8px;border-radius:8px;display:flex;align-items:center}
.light{background:white;color:black}
.light header{background:#e2e8f0;color:black}
.light .result-box,.light .history{background:#e2e8f0}
</style>
</head>
<body>

<header>📷 Barcode Scanner PRO</header>

<div class="container">

<button onclick="startCamera()">Start Kamera</button>
<button onclick="stopCamera()">Stop Kamera</button>
<button onclick="switchCamera()">Switch Kamera</button>
<button onclick="toggleMode()">Mode</button>

<input type="file" accept="image/*" onchange="scanImage(event)">

<video id="video" autoplay playsinline></video>

<div class="result-box">
<h3>Hasil:</h3>
<div id="result">-</div>
<div id="linkBox"></div>
</div>

<div class="history">
<h3>History</h3>
<button onclick="selectAll()">Pilih Semua</button>
<button onclick="deleteSelected()">Hapus</button>
<div id="history"></div>
</div>

</div>

<script>
let codeReader = new ZXing.BrowserMultiFormatReader();
let currentStream = null;
let currentDeviceId = null;
let lastScanTime = 0;
let delay = 1500;
let selected = new Set();

async function startCamera(){
 try{
  const devices = await navigator.mediaDevices.enumerateDevices();
  const cams = devices.filter(d=>d.kind==='videoinput');
  currentDeviceId = cams[0]?.deviceId;
  startDecode();
 }catch(e){alert(e)}
}

function startDecode(){
 navigator.mediaDevices.getUserMedia({video:{deviceId:currentDeviceId}})
 .then(stream=>{
  currentStream=stream;
  const video=document.getElementById('video');
  video.srcObject=stream;

  codeReader.decodeFromVideoDevice(currentDeviceId,'video',(res,err)=>{
    if(res){
      const now=Date.now();
      if(now-lastScanTime<delay) return;
      lastScanTime=now;
      handleResult(res.text);
    }
  });
 }).catch(err=>alert('Kamera error: '+err));
}

function stopCamera(){
 if(currentStream){
  currentStream.getTracks().forEach(t=>t.stop());
 }
 codeReader.reset();
}

async function switchCamera(){
 const devices = await navigator.mediaDevices.enumerateDevices();
 const cams = devices.filter(d=>d.kind==='videoinput');
 if(cams.length>1){
  currentDeviceId = cams[1].deviceId;
  stopCamera();
  startDecode();
 }
}

function handleResult(text){
 document.getElementById('result').innerText=text;
 showLink(text);
 saveHistory(text);
 beep();
}

function showLink(text){
 let box=document.getElementById('linkBox');
 box.innerHTML='';
 if(text.startsWith('http')){
  let a=document.createElement('a');
  a.href=text;
  a.innerText=text;
  a.target='_blank';
  box.appendChild(a);
 }
}

function saveHistory(text){
 let data=JSON.parse(localStorage.getItem('history')||'[]');
 data.unshift(text);
 localStorage.setItem('history',JSON.stringify(data));
 renderHistory();
}

function renderHistory(){
 let data=JSON.parse(localStorage.getItem('history')||'[]');
 let div=document.getElementById('history');
 div.innerHTML='';

 data.forEach((item,i)=>{
  let d=document.createElement('div');
  d.className='history-item';

  let cb=document.createElement('input');
  cb.type='checkbox';
  cb.onchange=e=>{
    if(e.target.checked) selected.add(i);
    else selected.delete(i);
  };

  let span=document.createElement('span');
  span.innerText=' '+item;

  d.appendChild(cb);
  d.appendChild(span);
  div.appendChild(d);
 });
}

function deleteSelected(){
 let data=JSON.parse(localStorage.getItem('history')||'[]');
 let newData=data.filter((_,i)=>!selected.has(i));
 localStorage.setItem('history',JSON.stringify(newData));
 selected.clear();
 renderHistory();
}

function selectAll(){
 let data=JSON.parse(localStorage.getItem('history')||'[]');
 selected=new Set(data.map((_,i)=>i));
 renderHistory();
}

function scanImage(e){
 const file=e.target.files[0];
 if(!file) return;
 const img=new Image();
 img.src=URL.createObjectURL(file);
 img.onload=()=>{
  const canvas=document.createElement('canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=img.width;
  canvas.height=img.height;
  ctx.drawImage(img,0,0);

  const luminance = new ZXing.RGBLuminanceSource(ctx.getImageData(0,0,canvas.width,canvas.height).data,canvas.width,canvas.height);
  const binary = new ZXing.BinaryBitmap(new ZXing.HybridBinarizer(luminance));

  try{
    const result = new ZXing.MultiFormatReader().decode(binary);
    handleResult(result.text);
  }catch{alert('Gagal scan')}
 }
}

function toggleMode(){
 document.body.classList.toggle('light');
}

function beep(){
 new Audio('https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg').play();
}

renderHistory();
</script>

</body>
</html>
